name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: 9b2be52a-2084-476f-99b9-57224e257e73
          tenant-id: 920d19c1-a625-4183-8fcf-1666fac04b10
          subscription-id: 3d54cfba-df7b-4e1d-975f-bafc838033ea

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: coinpricefinder-h3a3b5g0dmdydna4
          package: .
