# Nightly PCGS APR Prefetch -- Safety Net
# Pokes production to ensure the in-process scheduler fires.
# Runs at 11:05 PM PT (covers both PDT=06:05 UTC and PST=07:05 UTC).
# Harmless if the scheduler already ran -- quota check prevents double-burn.

name: Nightly Prefetch Trigger

on:
  schedule:
    # 6:05 AM UTC = 11:05 PM PDT (summer)
    # 7:05 AM UTC = 11:05 PM PST (winter)
    - cron: '5 6,7 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  trigger-prefetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake up App Service (health check)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://coinpricefinder-h3a3b5g0dmdydna4.azurewebsites.net/api/health")
          echo "Health check: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::App Service health check returned $STATUS"
            # Retry once after 10s (cold start)
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://coinpricefinder-h3a3b5g0dmdydna4.azurewebsites.net/api/health")
            echo "Retry health check: HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "::error::App Service is down"
              exit 1
            fi
          fi

      - name: Trigger prefetch run
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "x-api-key: ${ADMIN_API_KEY}" \
            "https://coinpricefinder-h3a3b5g0dmdydna4.azurewebsites.net/api/admin/prefetch-trigger")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Trigger response: HTTP $HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          # 202 Accepted is expected (fire-and-forget)
          if [ "$HTTP_CODE" != "202" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Prefetch trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi
          # Store the trigger response for later steps
          echo "$BODY" > /tmp/trigger_response.json

      - name: Poll prefetch status until completion
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          echo "Waiting for prefetch to complete..."
          MAX_POLLS=180  # 30 minutes with 10s intervals
          POLL_INTERVAL=10
          COMPLETED=false
          
          for i in $(seq 1 $MAX_POLLS); do
            sleep $POLL_INTERVAL
            RESPONSE=$(curl -s \
              -H "x-api-key: ${ADMIN_API_KEY}" \
              "https://coinpricefinder-h3a3b5g0dmdydna4.azurewebsites.net/api/admin/prefetch-status")
            
            # Extract todayCompleted field
            COMPLETED=$(echo "$RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data.get('todayCompleted', False))" 2>/dev/null)
            
            if [ "$COMPLETED" = "True" ]; then
              echo "✓ Prefetch completed successfully"
              echo "Status:"
              echo "$RESPONSE" | python3 -m json.tool 2>/dev/null
              echo "$RESPONSE" > /tmp/prefetch_final_status.json
              exit 0
            fi
            
            # Show progress every 30 seconds
            if [ $((i % 3)) -eq 0 ]; then
              echo "Poll $i/$MAX_POLLS: Still running..."
            fi
          done
          
          # Timeout: show last status and warn (don't fail)
          echo "::warning::Prefetch polling timed out after 30 minutes"
          echo "Last status:"
          echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE"
          # Don't exit with error — prefetch may still be running
          exit 0

      - name: Report prefetch results
        if: always()
        run: |
          if [ -f /tmp/prefetch_final_status.json ]; then
            echo "## ✓ Nightly APR Prefetch Completed" >> $GITHUB_STEP_SUMMARY
            {
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| API calls made | $(jq -r '.lastCallsMade // 0' /tmp/prefetch_final_status.json) |"
              echo "| New records | $(jq -r '.lastNewRecords // 0' /tmp/prefetch_final_status.json) |"
              echo "| Duration | $(jq -r '.lastDuration // "unknown"' /tmp/prefetch_final_status.json) |"
              echo "| Status | $(jq -r '.lastStatus // "unknown"' /tmp/prefetch_final_status.json) |"
              echo "| Quota remaining | $(jq -r '.quota.remaining // "unknown"' /tmp/prefetch_final_status.json) |"
              echo "| Queue remaining | $(jq -r '.queueRemaining // 0' /tmp/prefetch_final_status.json) |"
            } >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠ Prefetch Status Unknown" >> $GITHUB_STEP_SUMMARY
            echo "Could not confirm prefetch completion. Check /api/admin/prefetch-status manually." >> $GITHUB_STEP_SUMMARY
          fi
