// Simple UI for CoinPriceDiscoveryAgent
// Static HTML form for submitting queries and viewing results

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CoinPriceDiscoveryAgent</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; }
    .container { max-width: 600px; margin: auto; }
    label { display: block; margin-top: 1em; }
    input, textarea { width: 100%; padding: 0.5em; margin-top: 0.2em; }
    button { margin-top: 1em; padding: 0.7em 1.5em; }
    pre { background: #f4f4f4; padding: 1em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CoinPriceDiscoveryAgent</h1>
    <form id="queryForm">
      <label>Coin Name <input name="coin_name" required></label>
      <label>Grade <input name="grade" required></label>
      <label>Manual Evidence (CSV or JSON)<br>
        <textarea name="manual_evidence" rows="6" placeholder="Paste CSV or JSON here"></textarea>
      </label>
      <button type="submit">Submit Query</button>
    </form>
    <h2>Result</h2>
    <pre id="result"></pre>
  </div>
  <script>
    document.getElementById('queryForm').onsubmit = async function(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        coin_name: form.coin_name.value,
        grade: form.grade.value,
        manual_evidence: form.manual_evidence.value
      };
      const res = await fetch('/api/query/new', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      document.getElementById('result').textContent = JSON.stringify(json, null, 2);
    };
  </script>
</body>
</html>
